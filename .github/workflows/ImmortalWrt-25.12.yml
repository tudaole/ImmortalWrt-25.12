name: ImmortalWrt-25.12

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: X86.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 最大化磁盘空间
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 2048
        build-mount-path: /workdir
        remove-dotnet: true
        remove-android: true
        remove-haskell: true
        remove-codeql: true
        remove-docker-images: true

    - name: Checkout 仓库
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force || true
        sudo apt-get -qq update
        sudo apt-get -qq install -y \
          autoconf automake autopoint binutils bison build-essential \
          bzip2 cmake cpio curl flex gawk git gettext \
          haveged help2man jq libelf-dev libfuse-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
          libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool ninja-build \
          patch pkgconf python3 python3-dev python3-pip \
          python3-setuptools python3-pyelftools rsync \
          squashfs-tools subversion swig texinfo unzip \
          vim wget zip zlib1g-dev upx-ucl genisoimage \
          device-tree-compiler file clang llvm \
          libc6-dev-i386 xsltproc

        sudo apt-get -qq autoremove --purge
        sudo apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 克隆源码
      working-directory: /workdir
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        df -hT
 

    - name: 构建缓存加速
      uses: HiGarfield/cachewrtbuild@main
      with:
        mixkey: ${{ env.REPO_BRANCH }}-${{ env.CONFIG_FILE }}
        prefix: ${{ github.workspace }}/openwrt

    - name: 自定义 Feeds
      run: |
        [ -e "${FEEDS_CONF}" ] && mv "${FEEDS_CONF}" openwrt/feeds.conf.default
        chmod +x "${DIY_P1_SH}"
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新并安装 Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e "${CONFIG_FILE}" ] && mv "${CONFIG_FILE}" openwrt/.config

        chmod +x "${DIY_P2_SH}"
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载依赖
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc) || true
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd openwrt
        echo "使用 $(nproc) 线程编译..."
        make -j$(nproc) || make -j1 V=s


    - name: 整理固件
      run: |
        cd openwrt/bin/targets/*/* || exit 0
        rm -rf packages
        rm -f *rootfs* *kernel* *.manifest *.buildinfo
        DATE=$(TZ=Asia/Shanghai date +"%Y%m%d")             
        for file in *.img.gz *.bin *.qcow2 *.vdi *.vmdk *combined.img.gz *.json sha256sums; do
          [ -f "$file" ] || continue
          EXT="${file##*.}"             
          NAME="${file%.*}"             
          NEW="25.12_GXNAS_${DATE}_${NAME}.${EXT}"
          mv -f "$file" "$NEW"
        done
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "FILE_DATE=$DATE" >> $GITHUB_ENV 

    - name: 上传固件
      uses: actions/upload-artifact@main
      if: success()
      with:
        name: immortalwrt_25.12_GXNAS
        path: ${{ env.FIRMWARE }}

    - name: 清理运行日志
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 1
        keep_minimum_runs: 3
